name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: corepack enable
      - run: corepack prepare pnpm@latest --activate
      - run: pnpm i
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
